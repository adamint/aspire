name: VS Code extension E2E tests

on:
  workflow_call:

jobs:
  verify_extester_feed:
    name: Verify ExTester internal feed availability
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.verify.outputs.available }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify ExTester can install from dotnet-public-npm
        id: verify
        working-directory: extension
        run: |
          set +e
          node scripts/run-e2e.js --verify-extester-feed
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "### VS Code extension E2E matrix skipped"
              echo
              echo "The E2E runner could not install vscode-extension-tester from the internal dotnet-public-npm feed."
              echo "Pre-seed vscode-extension-tester and its transitive packages into dotnet-public-npm, then rerun CI."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::vscode-extension-tester is not available from dotnet-public-npm; skipping the VS Code extension E2E matrix."
          fi

  extester_feed_unavailable:
    name: VS Code extension E2E dependency unavailable
    needs: verify_extester_feed
    if: ${{ needs.verify_extester_feed.outputs.available != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped E2E matrix
        run: |
          {
            echo "### VS Code extension E2E matrix skipped"
            echo
            echo "The workflow is configured to use only the internal dotnet-public-npm feed."
            echo "vscode-extension-tester is not currently installable from that feed without authentication."
            echo "Pre-seed vscode-extension-tester and its transitive packages into dotnet-public-npm, then rerun CI to execute the matrix."
          } >> "$GITHUB_STEP_SUMMARY"

  extension_e2e:
    name: VS Code extension E2E (${{ matrix.name }}, ${{ matrix.shardName }})
    needs: verify_extester_feed
    if: ${{ needs.verify_extester_feed.outputs.available == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            shardName: command-palette
            spec: out/test-e2e/test-e2e/commandPalette.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: command-palette
            spec: out/test-e2e/test-e2e/commandPalette.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: settings-files
            spec: out/test-e2e/test-e2e/settingsFiles.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: settings-files
            spec: out/test-e2e/test-e2e/settingsFiles.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: discovery-configuration
            spec: out/test-e2e/test-e2e/discoveryConfiguration.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: discovery-configuration
            spec: out/test-e2e/test-e2e/discoveryConfiguration.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: apphost-tree
            spec: out/test-e2e/test-e2e/appHostTree.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: apphost-tree
            spec: out/test-e2e/test-e2e/appHostTree.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: tree-actions
            spec: out/test-e2e/test-e2e/treeActions.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: tree-actions
            spec: out/test-e2e/test-e2e/treeActions.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: debug-dashboard
            spec: out/test-e2e/test-e2e/debugDashboard.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: debug-dashboard
            spec: out/test-e2e/test-e2e/debugDashboard.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: zero-to-running
            spec: out/test-e2e/test-e2e/zeroToRunning.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: zero-to-running
            spec: out/test-e2e/test-e2e/zeroToRunning.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: package-surface
            spec: out/test-e2e/test-e2e/packageSurface.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: package-surface
            spec: out/test-e2e/test-e2e/packageSurface.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
          - name: Linux
            shardName: edge-cases
            spec: out/test-e2e/test-e2e/edgeCases.e2e.test.js
            runner: ubuntu-latest
            rid: linux-x64
            archivePattern: aspire-cli-linux-x64*.tar.gz
            cliBinary: aspire
            useXvfb: true
          - name: Windows
            shardName: edge-cases
            spec: out/test-e2e/test-e2e/edgeCases.e2e.test.js
            runner: windows-latest
            rid: win-x64
            archivePattern: aspire-cli-win-x64*.zip
            cliBinary: aspire.exe
            useXvfb: false
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'
          cache: yarn
          cache-dependency-path: extension/yarn.lock

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Download VSIX
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aspire-extension
          path: extension/out

      - name: Download CLI archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-native-archives-${{ matrix.rid }}
          path: artifacts/cli-archive

      - name: Download NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-nugets
          path: artifacts/nugets

      - name: Download RID-specific NuGet packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-nugets-for-${{ matrix.rid }}
          path: artifacts/nugets-rid

      - name: Validate lockfile registries
        working-directory: extension
        run: node -e "const fs = require('fs'); const allow = 'pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-public-npm'; const bad = fs.readFileSync('yarn.lock', 'utf8').split(/\\r?\\n/).filter(l => /^\\s*resolved\\s+\\x22/.test(l)).filter(l => !l.includes(allow)); if (bad.length) { throw new Error('extension/yarn.lock contains resolved entries outside the internal dotnet-public-npm feed. Regenerate it through the internal feed before restoring. First offender -> ' + bad[0]); }"

      - name: Install extension dependencies
        working-directory: extension
        run: corepack yarn@1.22.22 install --frozen-lockfile --non-interactive

      - name: Prepare Aspire CLI and package hive
        id: prepare_cli
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $archive = Get-ChildItem -Path '${{ github.workspace }}/artifacts/cli-archive' -Recurse -File -Filter '${{ matrix.archivePattern }}' | Select-Object -First 1
          if ($null -eq $archive) {
            Get-ChildItem -Path '${{ github.workspace }}/artifacts/cli-archive' -Recurse -File | Format-Table -AutoSize
            throw "Unable to find CLI archive matching ${{ matrix.archivePattern }}."
          }

          $bundleDir = Join-Path '${{ github.workspace }}' 'artifacts/bundle/${{ matrix.rid }}'
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          if ('${{ runner.os }}' -eq 'Windows') {
            Expand-Archive -Path $archive.FullName -DestinationPath $bundleDir -Force
          } else {
            tar -xzf $archive.FullName -C $bundleDir
          }

          $cli = Get-ChildItem -Path $bundleDir -Recurse -File -Filter '${{ matrix.cliBinary }}' | Select-Object -First 1
          if ($null -eq $cli) {
            Get-ChildItem -Path $bundleDir -Recurse -File | Format-Table -AutoSize
            throw "Unable to find ${{ matrix.cliBinary }} in extracted CLI archive."
          }

          if ('${{ runner.os }}' -ne 'Windows') {
            chmod +x $cli.FullName
          }

          & $cli.FullName setup

          $shippingDir = Join-Path '${{ github.workspace }}' 'artifacts/nugets/Debug/Shipping'
          if (-not (Test-Path $shippingDir)) {
            $shippingDir = Join-Path '${{ github.workspace }}' 'artifacts/nugets'
          }

          $samplePackage = Get-ChildItem -Path $shippingDir -Recurse -File -Filter 'Aspire.Hosting.AppHost.*.nupkg' | Select-Object -First 1
          if ($null -eq $samplePackage) {
            throw "Unable to find Aspire.Hosting.AppHost.*.nupkg under $shippingDir."
          }

          $hiveLabel = $null
          if ($samplePackage.Name -match '-pr\.([0-9]+)\.') {
            $hiveLabel = "pr-$($Matches[1])"
          } elseif ('${{ startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/internal/release/') }}' -eq 'true') {
            $hiveLabel = 'staging'
          } else {
            $hiveLabel = 'daily'
          }

          $hiveDir = Join-Path $HOME ".aspire/hives/$hiveLabel/packages"
          New-Item -ItemType Directory -Path $hiveDir -Force | Out-Null
          Get-ChildItem -Path $shippingDir -Recurse -File -Filter '*.nupkg' | Copy-Item -Destination $hiveDir -Force
          $ridNugets = Join-Path '${{ github.workspace }}' 'artifacts/nugets-rid'
          if (Test-Path $ridNugets) {
            Get-ChildItem -Path $ridNugets -Recurse -File -Filter '*.nupkg' | Copy-Item -Destination $hiveDir -Force
          }

          "ASPIRE_EXTENSION_E2E_CLI_PATH=$($cli.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASPIRE_EXTENSION_E2E_APPHOST_SDK_VERSION=$(($samplePackage.Name -replace '^Aspire\.Hosting\.AppHost\.', '') -replace '\.nupkg$', '')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $cli.FullName --version

      - name: Compile extension E2E tests
        working-directory: extension
        run: |
          corepack yarn@1.22.22 compile
          corepack yarn@1.22.22 compile-e2e
          if (-not (Test-Path '${{ matrix.spec }}')) {
            throw "Compiled E2E shard spec was not found: ${{ matrix.spec }}"
          }

      - name: Install E2E recorder
        if: ${{ matrix.useXvfb }}
        run: |
          if (Get-Command ffmpeg -ErrorAction SilentlyContinue) {
            ffmpeg -version | Select-Object -First 1
          } else {
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends ffmpeg
          }

      - name: Run extension E2E tests
        working-directory: extension
        env:
          ASPIRE_EXTENSION_E2E_VSIX: ${{ github.workspace }}/extension/out/aspire-extension.vsix
          ASPIRE_EXTENSION_E2E_SHARD: ${{ matrix.shardName }}
          ASPIRE_EXTENSION_E2E_SPEC: ${{ matrix.spec }}
          # Linux E2E jobs run under Xvfb, so record by default but keep/upload videos only for failures.
          # Set ASPIRE_EXTENSION_E2E_RECORDING_MODE=always when manually rerunning to keep successful recordings too.
          ASPIRE_EXTENSION_E2E_RECORDING_MODE: ${{ matrix.useXvfb && 'failure' || 'off' }}
        run: |
          if ('${{ matrix.useXvfb }}' -eq 'true') {
            xvfb-run -a node scripts/run-e2e.js
          } else {
            node scripts/run-e2e.js
          }

      - name: Upload E2E diagnostics
        id: upload_e2e_diagnostics
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: extension-e2e-diagnostics-${{ matrix.rid }}-${{ matrix.shardName }}-attempt${{ github.run_attempt }}
          path: |
            extension/.test-results/**
            extension/.test-storage/**
            extension/.test-storage/**/logs/**
            extension/.test-workspaces/**/.aspire/**
            extension/.test-workspaces/**/*.log
            extension/.test-recordings/**
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Print E2E diagnostics links
        if: always()
        working-directory: extension
        run: |
          $artifactName = "extension-e2e-diagnostics-${{ matrix.rid }}-${{ matrix.shardName }}-attempt${{ github.run_attempt }}"
          $artifactUrl = "${{ steps.upload_e2e_diagnostics.outputs.artifact-url }}"
          if ([string]::IsNullOrWhiteSpace($artifactUrl)) {
            $artifactUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          }
          $hasResults = Test-Path ".test-results"
          $hasStorage = Test-Path ".test-storage"
          $recordings = Get-ChildItem -Path ".test-recordings" -Recurse -File -Filter "*.mp4" -ErrorAction SilentlyContinue
          $recordingLogs = Get-ChildItem -Path ".test-recordings" -Recurse -File -Filter "*.ffmpeg.log" -ErrorAction SilentlyContinue
          $screenshots = Get-ChildItem -Path ".test-storage" -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "[/\\]screenshots[/\\]" }

          Write-Host "Extension E2E diagnostics artifact: $artifactName"
          Write-Host "Artifacts page: $artifactUrl"
          if ($hasResults) {
            Write-Host "Mocha/state files are under .test-results inside the artifact."
          }
          if ($hasStorage) {
            Write-Host "VS Code logs and Aspire home diagnostics are under .test-storage inside the artifact."
          }
          if ($screenshots) {
            Write-Host "Failure screenshots:"
            $screenshots | ForEach-Object { Write-Host "  $($_.FullName.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, ''))" }
          } else {
            Write-Host "No failure screenshots were found for this shard."
          }
          if ($recordings) {
            Write-Host "E2E recordings:"
            $recordings | ForEach-Object { Write-Host "  $($_.FullName.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, ''))" }
          } else {
            Write-Host "No E2E recordings were kept for this shard. Linux CI keeps recordings on failure by default; set ASPIRE_EXTENSION_E2E_RECORDING_MODE=always for successful-run videos."
          }
          if ($recordingLogs) {
            Write-Host "Recorder logs:"
            $recordingLogs | ForEach-Object { Write-Host "  $($_.FullName.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, ''))" }
          }
