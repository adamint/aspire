# Release Pipeline: Publish NuGet/npm Packages and Promote to GA Channel
#
# This pipeline automates the release process for microsoft/aspire:
# 1. Downloads signed packages from a specified build
# 2. Publishes packages to NuGet.org and npm
# 3. Promotes the build to the Aspire GA channel via darc
# 4. Submits WinGet manifests and Homebrew cask PRs
#
# For full documentation, see: docs/release-process.md

trigger: none  # Manual trigger only
pr: none       # Not triggered by PRs

parameters:
  - name: GaChannelName
    displayName: 'GA Channel Name'
    type: string
    default: 'Aspire 9.x GA'

  - name: DryRun
    displayName: 'Dry Run (skip actual publish - for testing)'
    type: boolean
    default: false

  # Idempotency flags for re-running after partial failures
  - name: SkipNuGetPublish
    displayName: 'Skip NuGet Publishing (set true if already completed)'
    type: boolean
    default: false

  - name: SkipNpmPublish
    displayName: 'Skip npm Publishing (set true if already completed)'
    type: boolean
    default: false

  - name: SkipNpmRidPublish
    displayName: 'Skip npm RID Package Publishing (set true if RID packages already completed but pointer package did not)'
    type: boolean
    default: false

  - name: SkipChannelPromotion
    displayName: 'Skip Channel Promotion (set true if already completed)'
    type: boolean
    default: false

  - name: SkipWinGetPublish
    displayName: 'Skip WinGet Publishing (set true if already completed)'
    type: boolean
    default: false

  - name: SkipHomebrewPublish
    displayName: 'Skip Homebrew Publishing (set true if already completed)'
    type: boolean
    default: false

  - name: NpmPublishOwners
    displayName: 'npm ESRP owners (comma-separated Microsoft aliases or emails)'
    type: string
    default: ''

  - name: NpmPublishApprovers
    displayName: 'npm ESRP approvers (comma-separated Microsoft aliases or emails)'
    type: string
    default: ''

  - name: NpmRegistryPropagationDelayMinutes
    displayName: 'Minutes to wait between npm RID and pointer package submissions'
    type: number
    default: 10

variables:
  - template: /eng/pipelines/common-variables.yml@self
  - template: /eng/common/templates-official/variables/pool-providers.yml@self
  # Variable group containing secrets (VscePublishToken for future use)
  # Note: NuGet publishing uses service connection 'NuGet.org - dotnet/aspire' instead of API key
  - group: Aspire-Release-Secrets
  # Variable group containing aspire-winget-bot-pat and aspire-homebrew-bot-pat for WinGet and Homebrew publishing
  - group: Aspire-Secrets

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release
  pipelines:
    - pipeline: aspire-build
      source: microsoft-aspire  # Name of the main build pipeline
      project: internal      # AzDO project name
      trigger: none          # Manual trigger only - no automatic releases

extends:
  template: azure-pipelines/1ES.Official.Publish.yml@MicroBuildTemplate
  parameters:
    pool:
      name: NetCore1ESPool-Internal
      image: windows.vs2026preview.scout.amd64
      os: windows
    # Network isolation policy for ES4.2.4 CFS compliance.
    # CFSClean is intentionally omitted here because it blocks all NuGet endpoints
    # (api.nuget.org, www.nuget.org, etc.) via DNS sinkhole and this release pipeline
    # must push packages to NuGet.org via the 1ES.PublishNuget@1 task. ES4.2.4 requires
    # pipelines to *consume* packages from internal feeds (which we do — NuGet.config
    # only uses pkgs.dev.azure.com/dnceng feeds), but does not prohibit *publishing* to
    # public registries. CFSClean2 is retained to block Docker, PowerShell Gallery, and
    # other endpoints not needed by this pipeline.
    # See: https://eng.ms/docs/microsoft-ai/webxt/feed-verticals/start-experiences/fv-live-site/sfi-executor-centric-wiki/skills/security/mdp-cfs-security-change/skill
    settings:
      networkIsolationPolicy: Permissive,CFSClean2

    stages:
      # ===== STAGE 1: PREPARE ARTIFACTS =====
      # This buildJob downloads artifacts from the source build and re-publishes them.
      # 1ES PT will inject SBOM generation tasks, making the artifacts compliant for releaseJob.
      - stage: PrepareArtifacts
        displayName: 'Prepare Artifacts with SBOM'
        jobs:
          - job: PrepareJob
            displayName: 'Download and Re-publish Artifacts'
            timeoutInMinutes: 30
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            variables:
              SourceBuildId: $(resources.pipeline.aspire-build.runID)
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish PackageArtifacts with SBOM'
                  targetPath: '$(Pipeline.Workspace)/packages/PackageArtifacts'
                  artifactName: 'PackageArtifacts'
                - output: pipelineArtifact
                  displayName: 'Publish npm RID Package Artifacts with SBOM'
                  targetPath: '$(Pipeline.Workspace)/npm/rid-packages'
                  artifactName: 'NpmRidPackageArtifacts'
                - output: pipelineArtifact
                  displayName: 'Publish npm Pointer Package Artifact with SBOM'
                  targetPath: '$(Pipeline.Workspace)/npm/pointer-package'
                  artifactName: 'NpmPointerPackageArtifacts'
                - output: pipelineArtifact
                  displayName: 'Publish npm Validation Summary'
                  targetPath: '$(Pipeline.Workspace)/npm/validation-summary'
                  artifactName: 'NpmValidationSummary'
                - output: pipelineArtifact
                  displayName: 'Publish WinGet Manifests'
                  targetPath: '$(Pipeline.Workspace)/installers/winget-manifests-stable'
                  artifactName: 'winget-manifests-stable'
                - output: pipelineArtifact
                  displayName: 'Publish Homebrew Cask'
                  targetPath: '$(Pipeline.Workspace)/installers/homebrew-cask-stable'
                  artifactName: 'homebrew-cask-stable'
            steps:
              - checkout: none

              - powershell: |
                  Write-Host "=== Prepare Artifacts Stage ==="
                  Write-Host "Source Build ID: $(resources.pipeline.aspire-build.runID)"
                  Write-Host "Source Build Name: $(resources.pipeline.aspire-build.runName)"
                  Write-Host "This stage downloads artifacts and re-publishes them so 1ES PT can generate SBOM."
                  Write-Host "Installer-only mode: ${{ and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipNpmPublish, true), eq(parameters.SkipChannelPromotion, true)) }}"
                  Write-Host "==============================="
                displayName: 'Log Stage Info'

              # Download artifacts from the source build pipeline
              - ${{ if not(and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true))) }}:
                - download: aspire-build
                  displayName: 'Download PackageArtifacts from Source Build'
                  artifact: PackageArtifacts
                  patterns: '**/*.nupkg'

              - ${{ if eq(parameters.SkipNpmPublish, false) }}:
                - download: aspire-build
                  displayName: 'Download npm packages from Source Build'
                  artifact: BlobArtifacts
                  patterns: '**/microsoft-aspire-cli*.tgz'

                - download: aspire-build
                  displayName: 'Download npm validation summary from Source Build'
                  artifact: npm-validation-summary

              - download: aspire-build
                displayName: 'Download WinGet Manifests from Source Build'
                artifact: winget-manifests-stable

              - download: aspire-build
                displayName: 'Download Homebrew Cask from Source Build'
                artifact: homebrew-cask-stable

              # Move artifacts to expected location for output
              - ${{ if not(and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true))) }}:
                - powershell: |
                    $sourcePath = "$(Pipeline.Workspace)/aspire-build/PackageArtifacts"
                    $targetPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"

                    Write-Host "Moving artifacts from $sourcePath to $targetPath"

                    if (!(Test-Path $targetPath)) {
                      New-Item -ItemType Directory -Path $targetPath -Force | Out-Null
                    }

                    # Copy all nupkg files
                    $packages = Get-ChildItem -Path $sourcePath -Filter "*.nupkg" -Recurse
                    Write-Host "Found $($packages.Count) packages to copy"

                    foreach ($pkg in $packages) {
                      Copy-Item $pkg.FullName -Destination $targetPath -Force
                      Write-Host "  Copied: $($pkg.Name)"
                    }

                    Write-Host "✓ Artifacts prepared for SBOM generation"
                  displayName: 'Prepare Artifacts for Publishing'

              - ${{ if and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true)) }}:
                - powershell: |
                    $targetPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"

                    if (!(Test-Path $targetPath)) {
                      New-Item -ItemType Directory -Path $targetPath -Force | Out-Null
                    }

                    Write-Host "Installer-only run detected; created empty PackageArtifacts placeholder."
                  displayName: 'Prepare Empty PackageArtifacts Placeholder'

              - ${{ if eq(parameters.SkipNpmPublish, false) }}:
                - powershell: |
                    $sourcePath = "$(Pipeline.Workspace)/aspire-build/BlobArtifacts"
                    $ridTargetPath = "$(Pipeline.Workspace)/npm/rid-packages"
                    $pointerTargetPath = "$(Pipeline.Workspace)/npm/pointer-package"
                    $expectedRids = @(
                      'win-x64',
                      'win-arm64',
                      'linux-x64',
                      'linux-arm64',
                      'linux-musl-x64',
                      'osx-x64',
                      'osx-arm64'
                    )

                    New-Item -ItemType Directory -Path $ridTargetPath -Force | Out-Null
                    New-Item -ItemType Directory -Path $pointerTargetPath -Force | Out-Null

                    Write-Host "Preparing npm packages from $sourcePath"
                    if (!(Test-Path $sourcePath)) {
                      # Avoid PowerShell here-strings inside YAML block scalars: the
                      # PowerShell parser requires the closing "@ at column 0, while
                      # YAML requires every line to be at or above the block indent.
                      # Composing the message from an array keeps both grammars happy.
                      $errorLines = @(
                        "BlobArtifacts was not downloaded from the source build at '$sourcePath'.",
                        "npm CLI packages ship as flat blobs in BlobArtifacts (configured via eng/Publishing.props).",
                        "Possible causes:",
                        "  1. The source build (azure-pipelines.yml) ran before the npm CLI package work landed.",
                        "     Re-run the release pipeline with SkipNpmPublish=true, or rebuild from a newer commit.",
                        "  2. The source build failed to produce or publish the BlobArtifacts pipeline artifact.",
                        "  3. The wrong source build was selected."
                      )
                      Write-Error ($errorLines -join [Environment]::NewLine)
                      exit 1
                    }

                    $versionPattern = '\d+(?:\.\d+){1,3}(?:-[0-9A-Za-z][0-9A-Za-z.-]*)?'
                    $pointerPattern = "^microsoft-aspire-cli-($versionPattern)\.tgz$"
                    $ridPattern = "^microsoft-aspire-cli-(?<Rid>.+?)-(?<Version>$versionPattern)\.tgz$"
                    $packages = @(Get-ChildItem -Path $sourcePath -Filter "microsoft-aspire-cli*.tgz" -Recurse -File)
                    $pointerPackages = @($packages | Where-Object { $_.Name -match $pointerPattern })
                    $ridPackages = @($packages | Where-Object { $_.Name -match $ridPattern })
                    $unexpectedPackages = @($packages | Where-Object { $_.Name -notmatch $pointerPattern -and $_.Name -notmatch $ridPattern })

                    Write-Host "Found $($packages.Count) npm package(s)."
                    foreach ($pkg in $packages) {
                      Write-Host "  - $($pkg.Name)"
                    }

                    if ($unexpectedPackages.Count -gt 0) {
                      Write-Error "Unexpected npm package filename(s): $($unexpectedPackages.Name -join ', ')"
                      exit 1
                    }

                    if ($pointerPackages.Count -ne 1) {
                      Write-Error "Expected exactly one Aspire CLI npm pointer package, but found $($pointerPackages.Count): $($pointerPackages.FullName -join ', ')"
                      exit 1
                    }

                    $ridPackageDetails = @($ridPackages | ForEach-Object {
                      if ($_.Name -match $ridPattern) {
                        [pscustomobject]@{
                          File = $_
                          Rid = $Matches.Rid
                          Version = $Matches.Version
                        }
                      }
                    })

                    $versions = @(
                      if ($pointerPackages[0].Name -match $pointerPattern) {
                        $Matches[1]
                      }
                      $ridPackageDetails | ForEach-Object { $_.Version }
                    ) | Sort-Object -Unique

                    if ($versions.Count -ne 1) {
                      Write-Error "Expected one npm package version, but found: $($versions -join ', ')"
                      exit 1
                    }

                    $duplicateRidGroups = @($ridPackageDetails | Group-Object Rid | Where-Object { $_.Count -gt 1 })
                    if ($duplicateRidGroups.Count -gt 0) {
                      $details = @($duplicateRidGroups | ForEach-Object { "$($_.Name): $($_.Group.File.Name -join ', ')" })
                      Write-Error "Expected exactly one npm RID package per RID, but found duplicates: $($details -join '; ')"
                      exit 1
                    }

                    $actualRids = @($ridPackageDetails | ForEach-Object { $_.Rid })
                    $missingRids = @($expectedRids | Where-Object { $_ -notin $actualRids })
                    $unexpectedRids = @($actualRids | Where-Object { $_ -notin $expectedRids })
                    if ($missingRids.Count -gt 0 -or $unexpectedRids.Count -gt 0) {
                      Write-Error "npm RID package set mismatch. Missing: $($missingRids -join ', '); Unexpected: $($unexpectedRids -join ', ')"
                      exit 1
                    }

                    foreach ($pkg in $ridPackages) {
                      Copy-Item $pkg.FullName -Destination $ridTargetPath -Force
                    }
                    Copy-Item $pointerPackages[0].FullName -Destination $pointerTargetPath -Force

                    # Copy the install-test validation summary into its own output folder.
                    # Stage 2 re-validates this summary before submitting to ESRP/MicroBuild.
                    $summarySource = "$(Pipeline.Workspace)/aspire-build/npm-validation-summary/validation-summary.json"
                    $summaryTarget = "$(Pipeline.Workspace)/npm/validation-summary"
                    New-Item -ItemType Directory -Path $summaryTarget -Force | Out-Null
                    if (!(Test-Path $summarySource)) {
                      Write-Error "npm validation summary was not downloaded from the source build at '$summarySource'. The source build's npm install-test job must have failed or did not run."
                      exit 1
                    }
                    Copy-Item $summarySource -Destination (Join-Path $summaryTarget 'validation-summary.json') -Force

                    Write-Host "Prepared $($ridPackages.Count) RID npm package(s) and pointer package version $($versions[0])."
                  displayName: 'Prepare npm Artifacts for Publishing'

              - ${{ if eq(parameters.SkipNpmPublish, true) }}:
                - powershell: |
                    New-Item -ItemType Directory -Path "$(Pipeline.Workspace)/npm/rid-packages" -Force | Out-Null
                    New-Item -ItemType Directory -Path "$(Pipeline.Workspace)/npm/pointer-package" -Force | Out-Null
                    New-Item -ItemType Directory -Path "$(Pipeline.Workspace)/npm/validation-summary" -Force | Out-Null
                    Write-Host "Created empty npm artifact placeholders because SkipNpmPublish=true."
                  displayName: 'Prepare Empty npm Artifact Placeholders'

              # Copy installer artifacts to expected locations for output
              - powershell: |
                  $artifacts = @(
                    @{ Name = 'winget-manifests-stable'; Source = '$(Pipeline.Workspace)/aspire-build/winget-manifests-stable'; Target = '$(Pipeline.Workspace)/installers/winget-manifests-stable' },
                    @{ Name = 'homebrew-cask-stable'; Source = '$(Pipeline.Workspace)/aspire-build/homebrew-cask-stable'; Target = '$(Pipeline.Workspace)/installers/homebrew-cask-stable' }
                  )

                  foreach ($artifact in $artifacts) {
                    Write-Host "Copying $($artifact.Name) from $($artifact.Source) to $($artifact.Target)"

                    if (!(Test-Path $artifact.Target)) {
                      New-Item -ItemType Directory -Path $artifact.Target -Force | Out-Null
                    }

                    $files = Get-ChildItem -Path $artifact.Source -Recurse -File
                    Write-Host "  Found $($files.Count) files"
                    foreach ($file in $files) {
                      $relativePath = $file.FullName.Substring($artifact.Source.Length + 1)
                      $destPath = Join-Path $artifact.Target $relativePath
                      $destDir = Split-Path $destPath -Parent
                      if (!(Test-Path $destDir)) {
                        New-Item -ItemType Directory -Path $destDir -Force | Out-Null
                      }
                      Copy-Item $file.FullName -Destination $destPath -Force
                      Write-Host "    Copied: $relativePath"
                    }
                  }

                  Write-Host "✓ Installer artifacts prepared"
                displayName: 'Prepare Installer Artifacts'

      # ===== STAGE 2: RELEASE =====
      # This releaseJob consumes the artifacts with SBOM and publishes to NuGet.org/npm
      - stage: Release
        displayName: 'Release to NuGet/npm and Promote'
        dependsOn: PrepareArtifacts
        jobs:
          - job: ReleaseJob
            displayName: 'Validate, Publish, and Promote'
            timeoutInMinutes: 240
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            variables:
              BarBuildId: ''
            # templateContext type: releaseJob enables proper network access for external publishing
            # inputs.pipelineArtifact consumes artifacts from PrepareArtifacts stage (which have SBOM)
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: PackageArtifacts
                  targetPath: '$(Pipeline.Workspace)/packages/PackageArtifacts'
                - input: pipelineArtifact
                  artifactName: NpmRidPackageArtifacts
                  targetPath: '$(Pipeline.Workspace)/npm/rid-packages'
                - input: pipelineArtifact
                  artifactName: NpmPointerPackageArtifacts
                  targetPath: '$(Pipeline.Workspace)/npm/pointer-package'
                - input: pipelineArtifact
                  artifactName: NpmValidationSummary
                  targetPath: '$(Pipeline.Workspace)/npm/validation-summary'
            steps:
              # ===== VALIDATION =====
              # Note: No checkout - releaseJob doesn't allow it. All scripts are inlined.
              # Artifacts are downloaded via templateContext inputs above.

              - powershell: |
                  Write-Host "=== Release Pipeline Parameters ==="
                  Write-Host "Source Build Pipeline: aspire-build"
                  Write-Host "Source Build ID: $(resources.pipeline.aspire-build.runID)"
                  Write-Host "Source Build Name: $(resources.pipeline.aspire-build.runName)"
                  Write-Host "Source Build URI: $(resources.pipeline.aspire-build.runURI)"
                  Write-Host "GA Channel: ${{ parameters.GaChannelName }}"
                  Write-Host "Dry Run: ${{ parameters.DryRun }}"
                  Write-Host "Skip NuGet Publish: ${{ parameters.SkipNuGetPublish }}"
                  Write-Host "Skip npm Publish: ${{ parameters.SkipNpmPublish }}"
                  Write-Host "Skip npm RID Publish: ${{ parameters.SkipNpmRidPublish }}"
                  Write-Host "Skip Channel Promotion: ${{ parameters.SkipChannelPromotion }}"
                  Write-Host "Installer-only mode: ${{ and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipNpmPublish, true), eq(parameters.SkipChannelPromotion, true)) }}"
                  Write-Host "==================================="
                displayName: 'Validate Parameters'

              # ===== EXTRACT BAR BUILD ID =====
              - ${{ if eq(parameters.SkipChannelPromotion, false) }}:
                - powershell: |
                    $buildId = "$(resources.pipeline.aspire-build.runID)"
                    $org = "$(System.CollectionUri)"
                    $project = "internal"

                    Write-Host "Fetching build tags for build: $buildId"

                    # Use Azure DevOps REST API to get build tags
                    $uri = "${org}${project}/_apis/build/builds/${buildId}/tags?api-version=7.0"
                    Write-Host "API URI: $uri"

                    try {
                      $response = Invoke-RestMethod -Uri $uri -Headers @{
                        Authorization = "Bearer $(System.AccessToken)"
                      } -Method Get

                      Write-Host "Build tags found: $($response.value -join ', ')"

                      # Find the BAR ID tag
                      $barIdTag = $response.value | Where-Object { $_ -match 'BAR ID - (\d+)' }

                      if ($barIdTag -and $barIdTag -match 'BAR ID - (\d+)') {
                        $barBuildId = $Matches[1]
                        Write-Host "✓ Extracted BAR Build ID: $barBuildId"
                        Write-Host "##vso[task.setvariable variable=BarBuildId]$barBuildId"
                      } else {
                        Write-Error "Could not find BAR ID tag in build $buildId. Tags found: $($response.value -join ', ')"
                        exit 1
                      }
                    } catch {
                      Write-Error "Failed to fetch build tags: $_"
                      exit 1
                    }
                  displayName: 'Extract BAR Build ID'
                  env:
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

              # ===== DOWNLOAD PACKAGES =====
              # Artifacts are downloaded automatically via templateContext.inputs above

              - ${{ if eq(parameters.SkipNuGetPublish, false) }}:
                - task: UseDotNet@2
                  displayName: 'Install .NET 10 SDK'
                  inputs:
                    packageType: 'sdk'
                    version: '10.0.x'

                - powershell: |
                    $packagesPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"
                    Write-Host "=== Package Inventory ==="

                    $packages = Get-ChildItem -Path $packagesPath -Filter "*.nupkg" -Recurse
                    Write-Host "Found $($packages.Count) packages:"

                    foreach ($pkg in $packages) {
                      $sizeMB = [math]::Round($pkg.Length / 1MB, 2)
                      Write-Host "  - $($pkg.Name) ($sizeMB MB)"
                    }

                    if ($packages.Count -eq 0) {
                      Write-Error "No packages found in artifacts!"
                      exit 1
                    }

                    Write-Host "==========================="
                  displayName: 'List Packages'

                # ===== VERIFY SIGNATURES =====
                - powershell: |
                    $packagesPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"
                    Write-Host "=== Verifying Package Signatures ==="

                    $packages = Get-ChildItem -Path $packagesPath -Filter "*.nupkg" -Recurse
                    $failedVerification = @()

                    foreach ($package in $packages) {
                      Write-Host "Verifying: $($package.Name)"

                      # Use $ErrorActionPreference to prevent PowerShell from treating stderr as terminating error
                      $originalErrorActionPreference = $ErrorActionPreference
                      $ErrorActionPreference = 'Continue'
                      $result = dotnet nuget verify $package.FullName 2>&1
                      $verifyExitCode = $LASTEXITCODE
                      $ErrorActionPreference = $originalErrorActionPreference

                      if ($verifyExitCode -ne 0) {
                        Write-Host "  ❌ Signature verification FAILED"
                        Write-Host $result
                        $failedVerification += $package.Name
                      } else {
                        Write-Host "  ✓ Signature valid"
                      }
                    }

                    if ($failedVerification.Count -gt 0) {
                      Write-Host ""
                      Write-Host "=== SIGNATURE VERIFICATION FAILED ==="
                      Write-Host "The following packages failed signature verification:"
                      foreach ($pkg in $failedVerification) {
                        Write-Host "  - $pkg"
                      }
                      Write-Error "Package signature verification failed. Aborting release."
                      exit 1
                    }

                    Write-Host ""
                    Write-Host "✓ All $($packages.Count) packages passed signature verification"
                    Write-Host "==========================="
                  displayName: 'Verify Package Signatures'

              # ===== PUBLISH TO NUGET =====
              # Dry Run: List packages that would be published (skip actual publish)
              - ${{ if and(eq(parameters.DryRun, true), eq(parameters.SkipNuGetPublish, false)) }}:
                - powershell: |
                    $packagesPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"
                    Write-Host "=== DRY RUN MODE ==="
                    Write-Host "⚠️ The following packages would be published to NuGet.org:"
                    Write-Host ""
                    $packages = Get-ChildItem -Path $packagesPath -Filter "*.nupkg" -Recurse
                    foreach ($pkg in $packages) {
                      $sizeMB = [math]::Round($pkg.Length / 1MB, 2)
                      Write-Host "  - $($pkg.Name) ($sizeMB MB)"
                    }
                    Write-Host ""
                    Write-Host "Total: $($packages.Count) packages"
                    Write-Host "=== DRY RUN - No packages were actually published ==="
                  displayName: 'Dry Run - List Packages (No Publish)'

              # Actual Publish: Use 1ES.PublishNuget task (only when not dry run and not skipped)
              # Pattern from dotnet-diagnostics-internal-components and dotnet-macios:
              # - useDotNetTask: false (required - DotNetCoreCLI@2 doesn't support encrypted API keys)
              # - nuGetFeedType: external + publishFeedCredentials for NuGet.org
              - ${{ if and(eq(parameters.DryRun, false), eq(parameters.SkipNuGetPublish, false)) }}:
                - task: 1ES.PublishNuget@1
                  displayName: 'Push Packages to NuGet.org'
                  inputs:
                    useDotNetTask: false
                    packagesToPush: '$(Pipeline.Workspace)/packages/PackageArtifacts/*.nupkg'
                    packageParentPath: '$(Pipeline.Workspace)/packages/PackageArtifacts'
                    nuGetFeedType: external
                    publishFeedCredentials: 'NuGet.org - dotnet/aspire'

              # Skip message when SkipNuGetPublish is true
              - ${{ if eq(parameters.SkipNuGetPublish, true) }}:
                - powershell: |
                    Write-Host "=== Skipping NuGet Publishing (SkipNuGetPublish=true) ==="
                  displayName: 'Skip NuGet Publish (flagged)'

              # ===== PUBLISH TO npm =====
              - ${{ if eq(parameters.SkipNpmPublish, false) }}:
                - powershell: |
                    $ErrorActionPreference = 'Stop'
                    $summaryPath = "$(Pipeline.Workspace)/npm/validation-summary/validation-summary.json"

                    if (!(Test-Path $summaryPath)) {
                      Write-Error "npm validation summary not found: $summaryPath. Refusing to publish without verified prepare-stage validation."
                      exit 1
                    }

                    try {
                      $summary = Get-Content -Raw $summaryPath | ConvertFrom-Json
                    }
                    catch {
                      Write-Error "npm validation summary is invalid JSON: $summaryPath"
                      throw
                    }

                    if (-not $summary.validatedByPreparePipeline) {
                      Write-Error "npm validation summary does not indicate successful prepare-stage validation."
                      exit 1
                    }

                    $requiredChecks = @('install', 'version', 'launcher', 'uninstall')
                    foreach ($checkName in $requiredChecks) {
                      $check = $summary.checks.$checkName
                      if ($null -eq $check) {
                        Write-Error "npm validation summary is missing required check '$checkName'."
                        exit 1
                      }

                      $status = "$($check.status)"

                      # AzDO does not error on referencing an unset task.setvariable; the
                      # variable expansion produces the literal '$(VarName)' token. The
                      # prepare template initializes every NpmCheck* var to 'failed' to
                      # prevent this, but defend against schema drift by rejecting any
                      # status that still looks like an unexpanded variable.
                      if ($status -like '$(*)') {
                        Write-Error "npm validation check '$checkName' has unexpanded status token '$status'. This indicates the prepare-stage script aborted before recording a real result."
                        exit 1
                      }

                      if ($status -ne 'passed') {
                        Write-Error "npm validation check '$checkName' did not pass (status='$status')."
                        exit 1
                      }
                    }

                    Write-Host "npm validation summary verified ($($summary.rid), version $($summary.expectedVersion))."
                  displayName: 'Validate npm Prepare-Stage Summary'

                - powershell: |
                    $ridPackagesPath = "$(Pipeline.Workspace)/npm/rid-packages"
                    $pointerPackagePath = "$(Pipeline.Workspace)/npm/pointer-package"
                    Write-Host "=== npm Package Inventory ==="

                    $ridPackages = @(Get-ChildItem -Path $ridPackagesPath -Filter "*.tgz" -File)
                    $pointerPackages = @(Get-ChildItem -Path $pointerPackagePath -Filter "*.tgz" -File)

                    Write-Host "RID packages: $($ridPackages.Count)"
                    foreach ($pkg in $ridPackages) {
                      $sizeMB = [math]::Round($pkg.Length / 1MB, 2)
                      Write-Host "  - $($pkg.Name) ($sizeMB MB)"
                    }

                    Write-Host "Pointer packages: $($pointerPackages.Count)"
                    foreach ($pkg in $pointerPackages) {
                      $sizeMB = [math]::Round($pkg.Length / 1MB, 2)
                      Write-Host "  - $($pkg.Name) ($sizeMB MB)"
                    }

                    if ($ridPackages.Count -ne 7 -or $pointerPackages.Count -ne 1) {
                      Write-Error "Expected 7 npm RID packages and 1 npm pointer package."
                      exit 1
                    }

                    Write-Host "=============================="
                  displayName: 'List npm Packages'

              - ${{ if and(eq(parameters.DryRun, true), eq(parameters.SkipNpmPublish, false)) }}:
                - powershell: |
                    Write-Host "=== DRY RUN MODE ==="
                    Write-Host "The following packages would be submitted to ESRP for npm publishing."
                    Write-Host ""
                    if ("${{ parameters.SkipNpmRidPublish }}" -eq "true") {
                      Write-Host "RID package submission would be skipped because SkipNpmRidPublish=true."
                    } else {
                      Write-Host "RID packages would be submitted first:"
                      Get-ChildItem -Path "$(Pipeline.Workspace)/npm/rid-packages" -Filter "*.tgz" -File | ForEach-Object {
                        Write-Host "  - $($_.Name)"
                      }
                      Write-Host ""
                      Write-Host "Then the pipeline would wait ${{ parameters.NpmRegistryPropagationDelayMinutes }} minute(s) for registry propagation."
                    }
                    Write-Host ""
                    Write-Host "The pointer package would be submitted last:"
                    Get-ChildItem -Path "$(Pipeline.Workspace)/npm/pointer-package" -Filter "*.tgz" -File | ForEach-Object {
                      Write-Host "  - $($_.Name)"
                    }
                    Write-Host ""
                    Write-Host "=== DRY RUN - No npm packages were actually published ==="
                  displayName: 'Dry Run - List npm Packages (No Publish)'

              - ${{ if and(eq(parameters.DryRun, false), eq(parameters.SkipNpmPublish, false)) }}:
                - powershell: |
                    $owners = "${{ parameters.NpmPublishOwners }}"
                    $approvers = "${{ parameters.NpmPublishApprovers }}"

                    if ([string]::IsNullOrWhiteSpace($owners)) {
                      Write-Error "NpmPublishOwners must be set before publishing npm packages."
                      exit 1
                    }

                    if ([string]::IsNullOrWhiteSpace($approvers)) {
                      Write-Error "NpmPublishApprovers must be set before publishing npm packages."
                      exit 1
                    }

                    Write-Host "npm ESRP owners and approvers were provided."
                  displayName: 'Validate npm ESRP Parameters'

                - ${{ if eq(parameters.SkipNpmRidPublish, false) }}:
                  - template: MicroBuild.Publish.yml@MicroBuildTemplate
                    parameters:
                      intent: 'PackageDistribution'
                      contentType: 'npm'
                      contentSource: 'Folder'
                      folderLocation: '$(Pipeline.Workspace)\npm\rid-packages'
                      waitForReleaseCompletion: true
                      owners: '${{ parameters.NpmPublishOwners }}'
                      approvers: '${{ parameters.NpmPublishApprovers }}'

                  - powershell: |
                      $delayMinutes = [int]'${{ parameters.NpmRegistryPropagationDelayMinutes }}'
                      if ($delayMinutes -le 0) {
                        Write-Host "Skipping npm registry propagation delay because NpmRegistryPropagationDelayMinutes=$delayMinutes."
                        exit 0
                      }

                      Write-Host "Waiting $delayMinutes minute(s) before publishing the pointer package so npm can observe the RID packages."
                      Start-Sleep -Seconds ($delayMinutes * 60)
                    displayName: 'Wait for npm RID Package Propagation'

                - ${{ if eq(parameters.SkipNpmRidPublish, true) }}:
                  - powershell: |
                      Write-Host "Skipping npm RID package publish because SkipNpmRidPublish=true. The pointer package will still be submitted."
                    displayName: 'Skip npm RID Publish (flagged)'

                - template: MicroBuild.Publish.yml@MicroBuildTemplate
                  parameters:
                    intent: 'PackageDistribution'
                    contentType: 'npm'
                    contentSource: 'Folder'
                    folderLocation: '$(Pipeline.Workspace)\npm\pointer-package'
                    waitForReleaseCompletion: true
                    owners: '${{ parameters.NpmPublishOwners }}'
                    approvers: '${{ parameters.NpmPublishApprovers }}'

              - ${{ if eq(parameters.SkipNpmPublish, true) }}:
                - powershell: |
                    Write-Host "=== Skipping npm Publishing (SkipNpmPublish=true) ==="
                  displayName: 'Skip npm Publish (flagged)'

              # ===== PROMOTE TO CHANNEL =====
              - ${{ if eq(parameters.SkipChannelPromotion, false) }}:
                - powershell: |
                    Write-Host "Installing darc CLI..."
                    
                    # Query Maestro API for the correct darc version
                    $versionEndpoint = 'https://maestro.dot.net/api/assets/darc-version?api-version=2020-02-20'
                    $darcVersion = (Invoke-WebRequest -Uri $versionEndpoint -UseBasicParsing).Content
                    Write-Host "Darc version: $darcVersion"
                    
                    # Install darc as a .NET global tool
                    $arcadeServicesSource = 'https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json'
                    Write-Host "Installing darc from $arcadeServicesSource..."
                    
                    dotnet tool install microsoft.dotnet.darc --version $darcVersion --add-source "$arcadeServicesSource" -g
                    
                    if ($LASTEXITCODE -ne 0) {
                      Write-Error "Failed to install darc CLI"
                      exit 1
                    }
                    
                    Write-Host "✓ Darc CLI installed successfully"
                  displayName: 'Install darc'

                - task: AzureCLI@2
                  displayName: 'Promote Build to Channel'
                  inputs:
                    azureSubscription: 'Darc: Maestro Production'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      $barBuildId = "$(BarBuildId)"
                      $channelName = "${{ parameters.GaChannelName }}"
                      $dryRun = [System.Convert]::ToBoolean("${{ parameters.DryRun }}")
                      $azdoToken = $env:SYSTEM_ACCESSTOKEN

                      Write-Host "=== Channel Promotion ==="
                      Write-Host "BAR Build ID: $barBuildId"
                      Write-Host "Target Channel: $channelName"

                      if ($dryRun) {
                        Write-Host "⚠️ DRY RUN MODE - Build will not actually be promoted"
                        Write-Host "[DRY RUN] Would run: darc add-build-to-channel --id $barBuildId --channel '$channelName' --azdev-pat <token> --ci"
                        exit 0
                      }

                      Write-Host "Promoting build $barBuildId to channel '$channelName'..."

                      # darc is installed as a global tool, so it's available in PATH
                      # --azdev-pat is required for darc to access Azure DevOps build artifacts
                      darc add-build-to-channel `
                        --id $barBuildId `
                        --channel "$channelName" `
                        --azdev-pat "$azdoToken" `
                        --ci

                      if ($LASTEXITCODE -ne 0) {
                        Write-Error "Failed to promote build to channel"
                        exit 1
                      }

                      Write-Host "✓ Build successfully promoted to '$channelName'"
                      Write-Host "==========================="
                  env:
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

              # ===== SUMMARY =====
              - powershell: |
                  Write-Host ""
                  Write-Host "╔═══════════════════════════════════════════════════════════════╗"
                  Write-Host "║                    RELEASE SUMMARY                            ║"
                  Write-Host "╠═══════════════════════════════════════════════════════════════╣"
                  Write-Host "║ Source Build:   $(resources.pipeline.aspire-build.runName)"
                  Write-Host "║ Source Build ID: $(resources.pipeline.aspire-build.runID)"
                  if ("${{ parameters.SkipChannelPromotion }}" -eq "true") {
                    Write-Host "║ BAR Build ID:   (SKIPPED)"
                  } else {
                    Write-Host "║ BAR Build ID:   $(BarBuildId)"
                  }
                  Write-Host "║ GA Channel:     ${{ parameters.GaChannelName }}"
                  Write-Host "║ Dry Run:        ${{ parameters.DryRun }}"
                  Write-Host "╠═══════════════════════════════════════════════════════════════╣"
                  Write-Host "║ NuGet Publish:  ${{ parameters.SkipNuGetPublish }}" -NoNewline
                  if ("${{ parameters.SkipNuGetPublish }}" -eq "true") {
                    Write-Host " (SKIPPED)"
                  } else {
                    Write-Host " (EXECUTED)"
                  }
                  Write-Host "║ npm Publish:    ${{ parameters.SkipNpmPublish }}" -NoNewline
                  if ("${{ parameters.SkipNpmPublish }}" -eq "true") {
                    Write-Host " (SKIPPED)"
                  } elseif ("${{ parameters.DryRun }}" -eq "true") {
                    Write-Host " (DRY RUN)"
                  } else {
                    Write-Host " (EXECUTED)"
                  }
                  Write-Host "║ npm RID Skip:   ${{ parameters.SkipNpmRidPublish }}"
                  Write-Host "║ Channel Promo:  ${{ parameters.SkipChannelPromotion }}" -NoNewline
                  if ("${{ parameters.SkipChannelPromotion }}" -eq "true") {
                    Write-Host " (SKIPPED)"
                  } else {
                    Write-Host " (EXECUTED)"
                  }
                  Write-Host "║ WinGet:         (runs in parallel after this job)"
                  Write-Host "║ Homebrew:       (runs in parallel after this job)"
                  Write-Host "╚═══════════════════════════════════════════════════════════════╝"
                  Write-Host ""
                displayName: 'Print Summary'
                condition: always()

          # ===== WINGET PUBLISHING =====
          - job: WinGetJob
            displayName: 'Submit WinGet Release Manifests'
            dependsOn: ReleaseJob
            condition: |
              and(
                in(dependencies.ReleaseJob.result, 'Succeeded', 'SucceededWithIssues'),
                eq('${{ parameters.SkipWinGetPublish }}', 'false')
              )
            timeoutInMinutes: 30
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: winget-manifests-stable
                  targetPath: '$(Pipeline.Workspace)/winget/winget-manifests-stable'
            steps:
              - template: /eng/pipelines/templates/publish-winget.yml@self
                parameters:
                  manifestArtifactPath: $(Pipeline.Workspace)/winget/winget-manifests-stable
                  packageIdentifier: Microsoft.Aspire
                  dryRun: ${{ parameters.DryRun }}

          # ===== HOMEBREW PUBLISHING =====
          - job: HomebrewJob
            displayName: 'Submit Homebrew Release Cask'
            dependsOn: ReleaseJob
            condition: |
              and(
                in(dependencies.ReleaseJob.result, 'Succeeded', 'SucceededWithIssues'),
                eq('${{ parameters.SkipHomebrewPublish }}', 'false')
              )
            timeoutInMinutes: 30
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: homebrew-cask-stable
                  targetPath: '$(Pipeline.Workspace)/homebrew/homebrew-cask-stable'
            steps:
              - template: /eng/pipelines/templates/publish-homebrew.yml@self
                parameters:
                  caskArtifactPath: $(Pipeline.Workspace)/homebrew/homebrew-cask-stable
                  dryRun: ${{ parameters.DryRun }}
