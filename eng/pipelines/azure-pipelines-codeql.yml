parameters:
  # Optionally do not publish to TSA. Useful for e.g. verifying fixes before PR.
- name: TSAEnabled
  displayName: Publish results to TSA
  type: boolean
  default: true

variables:
- template: /eng/pipelines/common-variables.yml
- template: /eng/common/templates/variables/pool-providers.yml
  # CG is handled in the primary CI pipeline
- name: skipComponentGovernanceDetection
  value: true
  # Force CodeQL enabled so it may be run on any branch
- name: Codeql.Enabled
  value: true
  # Do not let CodeQL 3000 Extension gate scan frequency
- name: Codeql.Cadence
  value: 0
  # CodeQL needs this plumbed along as a variable to enable TSA
- name: Codeql.TSAEnabled
  value: ${{ parameters.TSAEnabled }}

  # Build variables
- name: _BuildConfig
  value: Release

trigger: none

schedules:
  - cron: 0 12 * * 1
    displayName: Weekly Monday CodeQL run
    branches:
      include:
      - main
      - release/13.2
    always: true

jobs:
- job: codeql
  displayName: CodeQL
  pool:
    name: $(DncEngInternalBuildPool)
    demands: ImageOverride -equals 1es-windows-2022
  timeoutInMinutes: 90

  steps:

  - task: UseDotNet@2
    inputs:
      useGlobalJson: true

  # Install Node.js, yarn, and vsce so the VS Code extension can be built
  - task: UseNode@1
    displayName: Install node.js
    inputs:
      version: '20.x'

  - task: npmAuthenticate@0
    displayName: NPM authenticate
    inputs:
      workingFile: $(Build.SourcesDirectory)\.npmrc

  - task: PowerShell@2
    displayName: Set .npmrc environment
    inputs:
      targetType: 'inline'
      script: Write-Host "##vso[task.setvariable variable=NPM_CONFIG_USERCONFIG]$(Build.SourcesDirectory)\.npmrc"

  - task: PowerShell@2
    displayName: Install Corepack
    inputs:
      targetType: 'inline'
      script: |
        # Install the pinned Corepack shim. Keep this version in sync with
        # COREPACK_VERSION in extension/build.sh and $CorepackVersion in
        # extension/build.ps1. The Yarn release itself is pinned in
        # extension/package.json via the `packageManager` field, which
        # `corepack prepare --activate` reads from the current working directory.
        $CorepackVersion = '0.34.7'

        # npmAuthenticate writes credentials for npm into .npmrc. Corepack
        # ignores .npmrc auth, so copy those credentials into Corepack's
        # environment variables before preparing Yarn.
        $npmrcPath = $env:NPM_CONFIG_USERCONFIG
        if (-not $npmrcPath) {
          $npmrcPath = '$(Build.SourcesDirectory)\.npmrc'
        }

        if (Test-Path -LiteralPath $npmrcPath) {
          $npmrc = Get-Content -LiteralPath $npmrcPath
          $authToken = $npmrc | ForEach-Object {
            if ($_ -match '^\s*(?://.*?:)?_authToken\s*=\s*(.+?)\s*$') { $Matches[1] }
          } | Select-Object -First 1
          $username = $npmrc | ForEach-Object {
            if ($_ -match '^\s*(?://.*?:)?username\s*=\s*(.+?)\s*$') { $Matches[1] }
          } | Select-Object -First 1
          $encodedPassword = $npmrc | ForEach-Object {
            if ($_ -match '^\s*(?://.*?:)?_password\s*=\s*(.+?)\s*$') { $Matches[1] }
          } | Select-Object -First 1

          if ($authToken) {
            $env:COREPACK_NPM_TOKEN = $authToken
          } elseif ($username -and $encodedPassword) {
            $env:COREPACK_NPM_USERNAME = $username
            $env:COREPACK_NPM_PASSWORD = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($encodedPassword))
          }
        }

        npm install -g --registry "$env:COREPACK_NPM_REGISTRY" "corepack@$CorepackVersion"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        # Verify the version actually on PATH matches our pin. On Windows the
        # Node.js installer registers a `corepack.cmd` under
        # %ProgramFiles%\nodejs which may shadow the npm-global shim under
        # %APPDATA%\npm, so a successful `npm install -g corepack@<version>`
        # does NOT guarantee that subsequent `corepack` calls resolve to it.
        $installed = (corepack --version).Trim()
        if ($installed -ne $CorepackVersion) {
          Write-Error "corepack version mismatch: expected $CorepackVersion, got '$installed'. The bundled Corepack on PATH may be taking precedence over the npm-global install."
          exit 1
        }

        corepack enable
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        corepack prepare --activate
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        corepack yarn --version
      workingDirectory: '$(Build.SourcesDirectory)\extension'

  - task: PowerShell@2
    displayName: Install vsce
    inputs:
      targetType: 'inline'
      script: |
        npm install -g @vscode/vsce@3.7.1
        vsce --version
      workingDirectory: '$(Build.SourcesDirectory)'

  - task: CodeQL3000Init@0
    displayName: CodeQL Initialize

  - script: build.cmd
      -restore -build
      -configuration $(_BuildConfig)
      -prepareMachine
      -ci
      /p:BuildExtension=true
      /p:SkipNativeBuild=true
    displayName: Build

  - task: CodeQL3000Finalize@0
    displayName: CodeQL Finalize
