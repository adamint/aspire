<!doctype html>
<html>
<head>
<style>
body { margin: 0; padding: 28px; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; background: #111827; color: white; }
h1 { margin: 0 0 8px; font-size: 32px; }
p { margin: 0 0 20px; font-size: 18px; color: #d1d5db; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.card { background: #1f2937; border: 2px solid #374151; border-radius: 14px; padding: 12px; }
.label { font-weight: 700; font-size: 20px; margin-bottom: 10px; }
img { width: 100%; border-radius: 8px; border: 1px solid #4b5563; }
</style>
</head>
<body>
<h1>PR #17792 visual accessibility proof</h1>
<p>Closing Settings restores focus to the Settings button.</p>
<div class="grid">
<div class="card"><div class="label">main / before</div><img src="frame-base.png" /></div><div class="card"><div class="label">PR #17792 / after</div><img src="frame-pr.png" /></div>
</div>
</body>
</html>
